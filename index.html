<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>はたらくくるま — あそびのえほん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fbf3e2;
    font-family: 'Zen Maru Gothic', 'Fredoka', system-ui, sans-serif;
  }
  /* 全面 Canvas。タッチでスクロールせず描けるように touch-action: none */
  #game {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    cursor: crosshair;
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <!-- ES モジュールは https 配信(GitHub Pages)前提。相対パスで読み込む -->
